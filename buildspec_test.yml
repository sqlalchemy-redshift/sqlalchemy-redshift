version: 0.2

phases:
  install:
    commands:
      # start install test dependencies (specific for Python 3.13)
      - yum -y install bzip2-devel libffi-devel
      - yum -y groupinstall "Development Tools"
      - orig_dir=$PWD
      - cd /opt
      - curl https://ftp.openssl.org/source/old/1.1.1/openssl-1.1.1j.tar.gz --output openssl.tar.gz
      - tar xzf openssl.tar.gz
      - rm openssl.tar.gz
      - cd openssl-1.1.1j/
      - ./config --prefix=/opt/openssl && make && make install
      # end install test dependencies
      # start install Python
      - version=3.13.1
      - wget https://www.python.org/ftp/python/$version/Python-$version.tar.xz
      - tar xJf Python-$version.tar.xz
      - cd Python-$version
      - ./configure  --enable-optimizations --with-openssl=/opt/openssl
      - make
      - make altinstall
      # end install Python
      - cd $orig_dir
  pre_build:
    commands:
      - pip3.13 install uv
      - uv sync --dev
  build:
    commands:
      # Wait for Redshift Serverless workgroup to be available
      - echo "Waiting for Redshift Serverless workgroup to be available..."
      - |
        max_attempts=30
        attempt=0
        while [ $attempt -lt $max_attempts ]; do
          if aws redshift-serverless get-workgroup --workgroup-name sqlalchemy-redshift-test --region $AWS_DEFAULT_REGION 2>/dev/null | grep -q "AVAILABLE"; then
            echo "Redshift Serverless workgroup is available"
            break
          fi
          echo "Attempt $((attempt+1))/$max_attempts: Workgroup not ready yet, waiting 30 seconds..."
          sleep 30
          attempt=$((attempt+1))
        done
        if [ $attempt -eq $max_attempts ]; then
          echo "Timeout waiting for Redshift Serverless workgroup"
          exit 1
        fi
      # Run tests
      - uv run pytest tests/ --dbdriver psycopg2 --dbdriver psycopg2cffi --dbdriver redshift_connector $TEST_COMMAND