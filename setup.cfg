[bdist_wheel]
universal=1

[isort]
profile = black
line_length = 88
known_first_party = sqlalchemy_redshift
force_sort_within_sections = true
split_on_trailing_comma = true

[tool:black]
line_length = 88
target_version = ["py310", "py311", "py312", "py313", "py314"]
include = \.pyi?$

[flake8]
max-line-length = 88
extend-ignore = E203
