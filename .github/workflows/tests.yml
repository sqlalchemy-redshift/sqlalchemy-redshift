name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        sqlalchemy-version: ["1.4.*", "2.0.*"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        env:
          SA_VERSION: ${{ matrix.sqlalchemy-version }}
        run: |
          python -m pip install --upgrade pip
          pip install "sqlalchemy==${SA_VERSION}"
          pip install psycopg2-binary alembic pytest
          pip install -e .

      - name: Run tests
        run: |
          pytest tests/ \
            --ignore=tests/test_reflection.py \
            -k "not redshift_engine and not redshift_session and not _redshift and not test_custom_types_reflection and not test_external_table" \
            --dbdriver psycopg2 \
            -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 psycopg2-binary

      - name: Run flake8
        run: flake8 sqlalchemy_redshift/ tests/ --max-line-length=120
